# SonarCloud Configuration
# This file ensures all project files are properly scanned

# Project identification
sonar.projectKey=${env.PROJECT_KEY}
sonar.organization=${env.SONAR_ORG}

# Source code location - scan everything in the repository
sonar.sources=.

# Exclusions - ignore build artifacts, dependencies, and system files
sonar.exclusions=**/node_modules/**,\
  **/venv/**,\
  **/.venv/**,\
  **/env/**,\
  **/target/**,\
  **/build/**,\
  **/dist/**,\
  **/bin/**,\
  **/obj/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/.git/**,\
  **/.github/**,\
  **/.vscode/**,\
  **/.idea/**,\
  **/coverage/**,\
  **/.coverage,\
  **/htmlcov/**,\
  **/*.min.js,\
  **/*.min.css

# Test directories (if you have tests, uncomment and adjust)
# sonar.tests=tests,test

# Python-specific settings
sonar.python.version=3.8,3.9,3.10,3.11,3.12

# JavaScript/TypeScript settings (if applicable)
# sonar.javascript.node.maxspace=4096

# Java settings (if applicable)
# sonar.java.source=17
# sonar.java.binaries=target/classes

# Coverage (if you generate coverage reports)
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8

# SCM provider
sonar.scm.provider=git

# Verbose logging (useful for debugging)
# sonar.verbose=true
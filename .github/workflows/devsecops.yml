name: DevSecOps Pipeline - Risk-Adaptive Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SONAR_URL: https://sonarcloud.io
  SONAR_ORG: jubit-pincy
  AZURE_RESOURCE_GROUP: rg-devsecops
  WEIGHT_BUGS: 3
  WEIGHT_VULNS: 5
  WEIGHT_HOTSPOTS: 2

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Detect Project
  # ═══════════════════════════════════════════════════════════════
  detect:
    name: 🔍 Detect Project
    runs-on: ubuntu-latest
    outputs:
      types_json:   ${{ steps.detect.outputs.types_json }}
      primary_type: ${{ steps.detect.outputs.primary_type }}
      project_key:  ${{ steps.detect.outputs.project_key }}
      has_app: ${{ steps.detect.outputs.has_app }}
      has_azure_creds: ${{ steps.check_azure.outputs.has_creds }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Check Azure Credentials
        id: check_azure
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
            echo "✅ Azure credentials detected"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  No Azure credentials found"
          fi

      - name: Debug filesystem
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== All csproj files ==="
          find . -name "*.csproj" 2>/dev/null
          echo "=== requirements.txt exists? ==="
          ls requirements*.txt 2>/dev/null || echo "none found"


      - name: Detect project type
        id: detect
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          echo "project_key=${REPO_NAME}" >> "$GITHUB_OUTPUT"
          
          TYPES=()
          HAS_APP=false
          
          # Check for actual app code (excluding risk-engine and .github)
          if [ -d "src" ] || [ -d "App" ] || [ -f "app.py" ] || [ -f "index.js" ] || \
             [ -f "Program.cs" ] || find . -name "Program.cs" \
             -not -path "*/risk-engine/*" -not -path "*/.github/*" 2>/dev/null | grep -q .; then
            HAS_APP=true
          fi
          
          # Detect .NET (check anywhere except risk-engine)
          echo "=== Searching for .NET projects ==="
          find . -name "*.csproj" -not -path "*/risk-engine/*" -not -path "*/.github/*" 2>/dev/null || true
          
          if find . -name "*.csproj" \
             -not -path "*/risk-engine/*" \
             -not -path "*/.github/*" \
             -not -path "*/obj/*" \
             -not -path "*/bin/*" 2>/dev/null | grep -q .; then
            TYPES+=("dotnet")
            echo "✓ .NET project detected"
          fi
          
          # Detect Java
          if [ -f "pom.xml" ] || find . -name "build.gradle" \
             -not -path "*/risk-engine/*" -not -path "*/.github/*" 2>/dev/null | grep -q .; then
            TYPES+=("java")
          fi
          
          # Detect Python (require requirements.txt for app detection)
          if ([ -f "requirements.txt" ] || [ -f "src/requirements.txt" ] || [ -f "app/requirements.txt" ]) && \
             find . -name "*.py" -not -path "*/risk-engine/*" -not -path "*/.github/*" 2>/dev/null | grep -q .; then
            TYPES+=("python")
          fi
          
          # Detect Node.js
          if [ -f "package.json" ]; then
            TYPES+=("node")
          fi
          
          # Detect Go
          if [ -f "go.mod" ]; then
            TYPES+=("go")
          fi
          
          # Default to unknown if nothing found
          if [ ${#TYPES[@]} -eq 0 ]; then
            TYPES+=("unknown")
          fi
          
          # Build JSON
          JSON="["
          for i in "${!TYPES[@]}"; do
            [ $i -gt 0 ] && JSON+=","
            JSON+="\"${TYPES[$i]}\""
          done
          JSON+="]"
          
          PRIMARY="${TYPES[0]}"
          
          echo "types_json=${JSON}" >> "$GITHUB_OUTPUT"
          echo "primary_type=${PRIMARY}" >> "$GITHUB_OUTPUT"
          echo "has_app=${HAS_APP}" >> "$GITHUB_OUTPUT"
          
          echo "══════════════════════════════"
          echo "Detected: ${TYPES[*]}"
          echo "Primary: ${PRIMARY}"
          echo "Has App: ${HAS_APP}"
          echo "══════════════════════════════"

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Build
  # ═══════════════════════════════════════════════════════════════
  build:
    name: 🔨 Build
    needs: detect
    if: needs.detect.outputs.primary_type != 'unknown'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        if: needs.detect.outputs.primary_type == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET
        if: needs.detect.outputs.primary_type == 'dotnet'
        run: dotnet build --configuration Release

      - name: Setup Python
        if: needs.detect.outputs.primary_type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        if: needs.detect.outputs.primary_type == 'python'
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup Node
        if: needs.detect.outputs.primary_type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        if: needs.detect.outputs.primary_type == 'node'
        run: npm ci

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: SonarCloud
  # ═══════════════════════════════════════════════════════════════
  sonar:
    name: 🛡️ SonarCloud
    needs: [detect, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ needs.detect.outputs.project_key }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/risk-engine/**,**/reports/**,**/.github/**,**/node_modules/**,**/venv/**

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: Risk Analysis
  # ═══════════════════════════════════════════════════════════════
  risk:
    name: 📊 Risk Analysis
    needs: [detect, sonar]
    runs-on: ubuntu-latest
    if: always() && needs.detect.outputs.primary_type != 'unknown'
    outputs:
      risk_level: ${{ steps.risk.outputs.risk_level }}
      risk_score: ${{ steps.risk.outputs.risk_score }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Restore history
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: risk-history
          path: reports/
      
      - name: Run Risk Analyzer
        id: risk
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: ${{ needs.detect.outputs.project_key }}
          SONAR_URL: ${{ env.SONAR_URL }}
          WEIGHT_BUGS: ${{ env.WEIGHT_BUGS }}
          WEIGHT_VULNS: ${{ env.WEIGHT_VULNS }}
          WEIGHT_HOTSPOTS: ${{ env.WEIGHT_HOTSPOTS }}
          DETECTED_TYPES: ${{ needs.detect.outputs.types_json }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || '__AZURE_AD_CLIENT_ID__' }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || '__AZURE_AD_TENANT_ID__' }}
          AZURE_AD_DASHBOARD_CLIENT_ID: ${{ secrets.AZURE_DASHBOARD_CLIENT_ID }}

        run: |
          mkdir -p reports
          python3 risk-engine/risk-analyzer.py | tee /tmp/risk_output.txt || echo "Risk analysis failed"
          
          # Extract risk level (default to HIGH if failed - block deployment)
          LEVEL=$(grep -oP '(?<=Level: )\w+' /tmp/risk_output.txt 2>/dev/null | tail -1 || echo "HIGH")
          SCORE=$(grep -oP '(?<=Score: )\d+' /tmp/risk_output.txt 2>/dev/null | tail -1 || echo "999")
          
          echo "risk_level=${LEVEL}" >> "$GITHUB_OUTPUT"
          echo "risk_score=${SCORE}" >> "$GITHUB_OUTPUT"
          
          echo "════════════════════════════════"
          echo "Risk Level: ${LEVEL}"
          echo "Risk Score: ${SCORE}"
          echo "════════════════════════════════"

      - name: Inject config into report
        env:
          PUBLISHED_API_URL: ${{ secrets.API_ENDPOINT || '' }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || '' }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || '' }}
        run: |
          for file in reports/security-report.html; do
            [ -f "$file" ] || continue
            sed -i "s|${{ secrets.API_ENDPOINT }}|${PUBLISHED_API_URL}|g" "$file"
            sed -i "s|__AZURE_AD_CLIENT_ID__|${AZURE_AD_CLIENT_ID}|g" "$file"
            sed -i "s|__AZURE_AD_TENANT_ID__|${AZURE_AD_TENANT_ID}|g" "$file"
          done
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: reports/security-report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload history
        uses: actions/upload-artifact@v4
        with:
          name: risk-history
          path: reports/history.json
          retention-days: 90
          if-no-files-found: warn
          overwrite: true

      - name: ❌ Fail pipeline if HIGH risk
        if: steps.risk.outputs.risk_level == 'HIGH'
        run: |
          echo "::error::🚨 HIGH RISK DETECTED - Application deployment BLOCKED"
          echo "::error::Risk Score: ${{ steps.risk.outputs.risk_score }}"
          echo "::error::Review security dashboard for details"
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  ⛔ BUILD BLOCKED - HIGH SECURITY RISK"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Risk Score: ${{ steps.risk.outputs.risk_score }}"
          echo ""
          echo "Action required:"
          echo "  1. Review security report in artifacts"
          echo "  2. Fix critical vulnerabilities"
          echo "  3. Re-run pipeline after fixes"
          echo ""
          echo "Note: DevSecOps API will still deploy for issue management"
          echo "═══════════════════════════════════════════════"
          exit 1

  # ═══════════════════════════════════════════════════════════════
  # JOB 5: Publish Report (Always runs)
  # ═══════════════════════════════════════════════════════════════
  publish-report:
    name: 📄 Publish Report
    needs: [risk, deploy-api]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: security-dashboard
          path: ./public

      - name: Create placeholder if no report
        run: |
          mkdir -p public
          if [ -f "public/security-report.html" ]; then
            cp public/security-report.html public/index.html
          else
            echo "<html><body><h1>Report generation in progress...</h1></body></html>" > public/index.html
          fi

      - name: Inject runtime config into published report
        env:
          PUBLISHED_API_URL: ${{ needs.deploy-api.outputs.api_url || secrets.API_ENDPOINT || '' }}
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || '' }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || '' }}
        run: |
          for file in public/index.html public/security-report.html; do
            [ -f "$file" ] || continue
            sed -i "s|${{ secrets.API_ENDPOINT }}|${PUBLISHED_API_URL}|g" "$file"
            sed -i "s|__AZURE_AD_CLIENT_ID__|${AZURE_AD_CLIENT_ID}|g" "$file"
            sed -i "s|__AZURE_AD_TENANT_ID__|${AZURE_AD_TENANT_ID}|g" "$file"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - uses: actions/deploy-pages@v4
        id: deployment

  # ═══════════════════════════════════════════════════════════════
  # JOB 6: Deploy DevSecOps API (Always deploys - needed for remediation)
  # ═══════════════════════════════════════════════════════════════
  deploy-api:
    name: 🚀 Deploy DevSecOps API
    needs: [detect, risk]
    runs-on: ubuntu-latest
    # API ALWAYS deploys (even on HIGH risk) - it's needed to manage issues
    if: |
      always() &&
      needs.detect.outputs.primary_type != 'unknown' &&
      needs.detect.outputs.has_azure_creds == 'true'
    outputs:
      api_url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Show deployment decision
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  DevSecOps API Deployment"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Risk Level: ${{ needs.risk.outputs.risk_level }}"
          echo "Risk Score: ${{ needs.risk.outputs.risk_score }}"
          echo ""
          echo "ℹ️  API deployment proceeding regardless of risk level"
          echo "   (Required for issue resolution and remediation)"
          echo ""

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & Push API Image
        env:
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f risk-engine/Dockerfile \
            -t ${ACR_SERVER}/devsecops-api:${IMAGE_TAG} \
            -t ${ACR_SERVER}/devsecops-api:latest \
            ./risk-engine
          
          docker push ${ACR_SERVER}/devsecops-api:${IMAGE_TAG}
          docker push ${ACR_SERVER}/devsecops-api:latest

      - name: Deploy Container App
        id: deploy
        env:
          API_NAME: ${{ secrets.AZURE_API_NAME }}
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/devsecops-api:${{ github.sha }}
        run: |
          if az containerapp show --name $API_NAME --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &>/dev/null; then
            echo "Updating container app..."
            az containerapp update \
              --name $API_NAME \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image $IMAGE \
              --min-replicas 1 \
              --set-env-vars \
                SONAR_URL=${{ env.SONAR_URL }} \
                PROJECT_KEY=${{ needs.detect.outputs.project_key }} \
                AZURE_AD_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }} \
                AZURE_AD_TENANT_ID=${{ secrets.AZURE_TENANT_ID }} \
                AZURE_AD_DASHBOARD_CLIENT_ID=${{ secrets.AZURE_DASHBOARD_CLIENT_ID }}
          else
            echo "Creating container app..."
            az containerapp create \
              --name $API_NAME \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment devsecops-env \
              --image $IMAGE \
              --target-port 5000 \
              --ingress external \
              --registry-server $ACR_SERVER \
              --secrets \
                sonar-token=${{ secrets.SONAR_TOKEN }} \
              --env-vars \
                SONAR_URL=${{ env.SONAR_URL }} \
                PROJECT_KEY=${{ needs.detect.outputs.project_key }} \
                SONAR_TOKEN=secretref:sonar-token \
                AZURE_AD_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }} \
                AZURE_AD_TENANT_ID=${{ secrets.AZURE_TENANT_ID }} \
                AZURE_AD_DASHBOARD_CLIENT_ID=${{ secrets.AZURE_DASHBOARD_CLIENT_ID }} \
              --cpu 0.5 --memory 1.0Gi \
              --min-replicas 1 --max-replicas 3
          fi
          
          echo "Setting ingress timeout..."
          az containerapp ingress update \
            --name $API_NAME \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --transport http \
            --timeout 120

          # Configure CORS
          echo "Configuring CORS..."
          az containerapp ingress cors enable \
            --name $API_NAME \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --allowed-origins "https://jubit-pincy.github.io" \
            --allowed-methods "GET" "POST" "OPTIONS" \
            --allowed-headers "Authorization" "Content-Type" "Accept" \
            --max-age 3600
          
          URL=$(az containerapp show \
            --name $API_NAME \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          
          echo "url=https://$URL" >> "$GITHUB_OUTPUT"
          echo "✅ DevSecOps API deployed: https://$URL"

  # ═══════════════════════════════════════════════════════════════
  # JOB 7: Deploy Application (BLOCKED on HIGH risk)
  # ═══════════════════════════════════════════════════════════════
  deploy-app:
    name: 🌤️ Deploy Application
    needs: [detect, risk, deploy-api]
    runs-on: ubuntu-latest
    outputs:
      app_url: ${{ steps.get_url.outputs.url }}
    # CRITICAL: Block deployment if risk is HIGH
    if: |
      needs.risk.result == 'success' &&
      needs.risk.outputs.risk_level != 'HIGH' &&
      needs.detect.outputs.has_app == 'true' &&
      needs.detect.outputs.has_azure_creds == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Show deployment decision
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  Application Deployment - APPROVED"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Risk Level: ${{ needs.risk.outputs.risk_level }}"
          echo "Risk Score: ${{ needs.risk.outputs.risk_score }}"
          echo ""
          echo "✅ Risk level acceptable - proceeding with deployment"
          echo ""

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Web App if not exists
        run: |
          if ! az webapp show --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &>/dev/null; then
            echo "Creating web app..."
            az webapp create \
              --name ${{ secrets.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --plan plan-weather \
              --runtime "DOTNETCORE:8.0"
          fi

      - name: Deploy Python App
        if: needs.detect.outputs.primary_type == 'python'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .

      - name: Deploy Node App
        if: needs.detect.outputs.primary_type == 'node'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .

      - name: Deploy .NET App
        if: needs.detect.outputs.primary_type == 'dotnet'
        run: |
          dotnet publish -c Release -o ./publish
          cd publish && zip -r ../app.zip .
          az webapp deployment source config-zip \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src ../app.zip

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings \
              API_ENDPOINT=${{ needs.deploy-api.outputs.api_url }} \
              SONAR_URL=${{ env.SONAR_URL }}

      - name: Get App URL
        run: |
          URL=$(az webapp show \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query defaultHostName -o tsv)
          echo "✅ Application deployed: https://$URL"
          echo "url=https://$URL" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════
  # JOB 8: Deployment Blocked (Shows when app deployment is blocked)
  # ═══════════════════════════════════════════════════════════════
  deployment-blocked:
    name: ⛔ Deployment Blocked
    needs: [detect, risk]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.risk.outputs.risk_level == 'HIGH' &&
      needs.detect.outputs.has_app == 'true'

    steps:
      - name: Show blocking reason
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  ⛔ APPLICATION DEPLOYMENT BLOCKED"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "Risk Level: HIGH"
          echo "Risk Score: ${{ needs.risk.outputs.risk_score }}"
          echo ""
          echo "Security issues prevent application deployment:"
          echo "  • Critical vulnerabilities detected"
          echo "  • Risk score exceeds acceptable threshold"
          echo ""
          echo "Actions required:"
          echo "  1. Review security dashboard"
          echo "  2. Fix identified vulnerabilities"
          echo "  3. Use DevSecOps API to resolve issues"
          echo "  4. Re-run pipeline after remediation"
          echo ""
          echo "DevSecOps API URL: ${{ needs.deploy-api.outputs.api_url }}"
          echo "Security Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo ""
          echo "═══════════════════════════════════════════════"

  # ═══════════════════════════════════════════════════════════════
  # JOB 9: Summary
  # ═══════════════════════════════════════════════════════════════
  summary:
    name: 📋 Summary
    needs: [detect, risk, deploy-api, deploy-app, publish-report, deployment-blocked]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 🎯 DevSecOps Pipeline Results
          
          ### Detection
          - **Project Type:** ${{ needs.detect.outputs.primary_type }}
          - **Has Application:** ${{ needs.detect.outputs.has_app }}
          - **Azure Credentials:** ${{ needs.detect.outputs.has_azure_creds }}
          
          ### Security Analysis
          - **Risk Level:** ${{ needs.risk.outputs.risk_level || 'Not Available' }}
          - **Risk Score:** ${{ needs.risk.outputs.risk_score || 'N/A' }}
          - **Risk Job Status:** ${{ needs.risk.result }}
          
          ### Deployment Status
          - **DevSecOps API:** ${{ needs.deploy-api.result == 'success' && '✅ Deployed' || needs.deploy-api.result == 'skipped' && '⏭️ Skipped (no Azure creds)' || '❌ Failed' }}
          - **API URL:** ${{ needs.deploy-api.outputs.api_url || needs.deploy-api.result == 'skipped' && 'N/A' || 'Capture failed — check deploy-api logs' }}
          - **Application:** ${{ needs.deploy-app.result }} ${{ needs.risk.outputs.risk_level == 'HIGH' && '⛔ (Blocked due to HIGH risk)' || '' }}
          
          ### Deployment Decision
          ${{ needs.risk.outputs.risk_level == 'HIGH' && '⛔ **APPLICATION DEPLOYMENT BLOCKED**<br><br>High security risk detected. Application deployment prevented.\nDevSecOps API deployed for issue remediation.<br><br>**Action Required:** Fix vulnerabilities and re-run pipeline.' || '✅ **DEPLOYMENT APPROVED**<br><br>Security risk acceptable. All systems deployed successfully.' }}
          
          ### URLs
          - **DevSecOps API:** ${{ needs.deploy-api.outputs.api_url || 'Not deployed' }}

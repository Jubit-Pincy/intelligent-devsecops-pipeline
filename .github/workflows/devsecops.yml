name: Intelligent Risk-Adaptive DevSecOps Pipeline with Azure Deployment

on:
  push:
    branches: [ main, Testing ]
  pull_request:
    branches: [ main, Testing ]
  workflow_dispatch:
    inputs:
      weight_bugs:
        description: 'Weight for Bugs'
        required: false
        default: '3'
      weight_vulns:
        description: 'Weight for Vulnerabilities'
        required: false
        default: '5'
      weight_hotspots:
        description: 'Weight for Security Hotspots'
        required: false
        default: '2'
      manual_project_type:
        description: 'Force project type (auto/dotnet/java/python/node/cpp)'
        required: false
        default: 'auto'

env:
  SONAR_URL: https://sonarcloud.io
  SONAR_ORG: jubit-pincy
  WEIGHT_BUGS:     ${{ github.event.inputs.weight_bugs     || '3' }}
  WEIGHT_VULNS:    ${{ github.event.inputs.weight_vulns    || '5' }}
  WEIGHT_HOTSPOTS: ${{ github.event.inputs.weight_hotspots || '2' }}
  AZURE_RESOURCE_GROUP: rg-devsecops
  ACR_NAME: ${{ secrets.ACR_NAME }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Detect Project Types (EXCLUDING risk-engine)
  # ═══════════════════════════════════════════════════════════════
  detect:
    name: 🔍 Detect Project Types
    runs-on: ubuntu-latest
    outputs:
      types_json:   ${{ steps.detect.outputs.types_json }}
      primary_type: ${{ steps.detect.outputs.primary_type }}
      deploy_enabled: ${{ steps.detect.outputs.deploy_enabled }}
      project_key:  ${{ steps.detect.outputs.project_key }}
      has_weather_app: ${{ steps.detect.outputs.has_weather_app }}
      has_azure_creds: ${{ steps.check_creds.outputs.has_creds }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # ADD THIS STEP:
      - name: Check for Azure Credentials
        id: check_creds
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ -n "$CLIENT_ID" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: 🔎 Detect project composition
        id: detect
        shell: bash
        run: |
          MANUAL="${{ github.event.inputs.manual_project_type || 'auto' }}"
          REPO_NAME="${{ github.event.repository.name }}"
          echo "project_key=${REPO_NAME}" >> "$GITHUB_OUTPUT"

          if [ "$MANUAL" != "auto" ]; then
            echo "types_json=[\"${MANUAL}\"]"  >> "$GITHUB_OUTPUT"
            echo "primary_type=${MANUAL}"       >> "$GITHUB_OUTPUT"
            echo "deploy_enabled=true"          >> "$GITHUB_OUTPUT"
            echo "has_weather_app=false"        >> "$GITHUB_OUTPUT"
            echo "✓ Manual override → ${MANUAL}"
            exit 0
          fi

          TYPES=()
          HAS_APP=false

          # CRITICAL: Exclude risk-engine, .github, and analysis directories
          EXCLUDE_PATHS=(
            -not -path "./risk-engine/*"
            -not -path "./.github/*"
            -not -path "./reports/*"
            -not -path "./.git/*"
            -not -path "./node_modules/*"
            -not -path "./venv/*"
            -not -path "./.venv/*"
            -not -path "./bin/*"
            -not -path "./obj/*"
          )

          # ── Check for actual application code ─────────────────
          if [ -d "src" ] || [ -d "app" ] || [ -f "app.py" ] || [ -f "index.js" ] || [ -f "Program.cs" ]; then
            HAS_APP=true
          fi

          # ── .NET ──────────────────────────────────────────────
          if find . -maxdepth 5 -name "*.csproj" "${EXCLUDE_PATHS[@]}" | grep -q .; then
            TYPES+=("dotnet")
            echo "✓ Detected: .NET"
          fi

          # ── Java / Maven / Gradle ─────────────────────────────
          if [ -f "pom.xml" ] || find . -maxdepth 3 -name "build.gradle" "${EXCLUDE_PATHS[@]}" | grep -q .; then
            TYPES+=("java")
            echo "✓ Detected: Java"
          fi

          # ── Python ────────────────────────────────────────────
          # Look for requirements.txt in root or src/, but NOT in risk-engine/
          if [ -f "requirements.txt" ] || [ -f "src/requirements.txt" ] || \
             [ -f "pyproject.toml" ] || [ -f "setup.py" ] || [ -f "Pipfile" ]; then
            # Verify it's not ONLY risk-engine files
            if find . -maxdepth 5 -name "*.py" "${EXCLUDE_PATHS[@]}" | grep -q .; then
              TYPES+=("python")
              echo "✓ Detected: Python"
            fi
          fi

          # ── Node / JS / TS / React / Vue ──────────────────────
          if [ -f "package.json" ] && [ ! -f "risk-engine/package.json" ]; then
            TYPES+=("node")
            echo "✓ Detected: Node.js"
          fi

          # ── C / C++ ───────────────────────────────────────────
          if [ -f "CMakeLists.txt" ] || [ -f "Makefile" ] || \
             find . -maxdepth 5 \( -name "*.cpp" -o -name "*.c" \) "${EXCLUDE_PATHS[@]}" | grep -q .; then
            TYPES+=("cpp")
            echo "✓ Detected: C/C++"
          fi

          # ── Go ────────────────────────────────────────────────
          if [ -f "go.mod" ] || find . -maxdepth 5 -name "*.go" "${EXCLUDE_PATHS[@]}" | grep -q .; then
            TYPES+=("go")
            echo "✓ Detected: Go"
          fi

          # ── Ruby ──────────────────────────────────────────────
          if [ -f "Gemfile" ] || find . -maxdepth 5 -name "*.rb" "${EXCLUDE_PATHS[@]}" | grep -q .; then
            TYPES+=("ruby")
            echo "✓ Detected: Ruby"
          fi

          # ── PHP ───────────────────────────────────────────────
          if [ -f "composer.json" ] || find . -maxdepth 5 -name "*.php" "${EXCLUDE_PATHS[@]}" | grep -q .; then
            TYPES+=("php")
            echo "✓ Detected: PHP"
          fi

          # ── Rust ──────────────────────────────────────────────
          if [ -f "Cargo.toml" ]; then
            TYPES+=("rust")
            echo "✓ Detected: Rust"
          fi

          if [ ${#TYPES[@]} -eq 0 ]; then
            echo "⚠️  No project files detected (only analysis tools present)"
            echo "types_json=[\"unknown\"]"   >> "$GITHUB_OUTPUT"
            echo "primary_type=unknown"       >> "$GITHUB_OUTPUT"
            echo "deploy_enabled=false"       >> "$GITHUB_OUTPUT"
            echo "has_weather_app=false"      >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build JSON array
          JSON="["
          for i in "${!TYPES[@]}"; do
            [ $i -gt 0 ] && JSON+=","
            JSON+="\"${TYPES[$i]}\""
          done
          JSON+="]"

          PRIMARY="${TYPES[0]}"
          DEPLOY="false"
          if [ -f "Dockerfile" ] && [ "$HAS_APP" = "true" ]; then
            DEPLOY="true"
          fi

          echo "types_json=${JSON}"           >> "$GITHUB_OUTPUT"
          echo "primary_type=${PRIMARY}"      >> "$GITHUB_OUTPUT"
          echo "deploy_enabled=${DEPLOY}"     >> "$GITHUB_OUTPUT"
          echo "has_weather_app=${HAS_APP}"   >> "$GITHUB_OUTPUT"

          echo ""
          echo "════════════════════════════════════════"
          echo " Detected types    : ${TYPES[*]}"
          echo " Primary type      : ${PRIMARY}"
          echo " Has application   : ${HAS_APP}"
          echo " Deploy enabled    : ${DEPLOY}"
          echo "════════════════════════════════════════"

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Build Application (Matrix)
  # ═══════════════════════════════════════════════════════════════
  build:
    name: 🔨 Build (${{ matrix.project_type }})
    needs: detect
    if: needs.detect.outputs.primary_type != 'unknown'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project_type: ${{ fromJson(needs.detect.outputs.types_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # ── .NET ──────────────────────────────────────────────────
      - name: Setup .NET
        if: matrix.project_type == 'dotnet'
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET
        if: matrix.project_type == 'dotnet'
        run: dotnet build --configuration Release

      # ── Java ──────────────────────────────────────────────────
      - name: Setup Java
        if: matrix.project_type == 'java'
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Java (Maven)
        if: matrix.project_type == 'java' && hashFiles('pom.xml') != ''
        run: mvn clean install -DskipTests

      - name: Build Java (Gradle)
        if: matrix.project_type == 'java' && hashFiles('build.gradle') != ''
        run: ./gradlew build -x test

      # ── Python ────────────────────────────────────────────────
      - name: Setup Python
        if: matrix.project_type == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install Python deps
        if: matrix.project_type == 'python'
        run: |
          python -m pip install --upgrade pip
          # Install from project requirements, NOT risk-engine
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          elif [ -f src/requirements.txt ]; then
            pip install -r src/requirements.txt
          fi

      # ── Node ──────────────────────────────────────────────────
      - name: Setup Node
        if: matrix.project_type == 'node'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node deps
        if: matrix.project_type == 'node'
        run: npm ci --prefer-offline --ignore-scripts

      # ── Go ────────────────────────────────────────────────────
      - name: Setup Go
        if: matrix.project_type == 'go'
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.22'

      - name: Build Go
        if: matrix.project_type == 'go'
        run: go build ./...

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: SonarCloud Analysis
  # ═══════════════════════════════════════════════════════════════
  sonar:
    name: 🛡️ SonarCloud Analysis
    needs: [detect, build]
    runs-on: ubuntu-latest
    outputs:
      task_id: ${{ steps.parse_task.outputs.task_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: '17'

      - name: SonarCloud scan
        if: needs.detect.outputs.primary_type != 'dotnet'
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ needs.detect.outputs.project_key }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/venv/**,**/.venv/**,**/target/**,**/build/**,**/dist/**,**/__pycache__/**,**/.git/**,**/.github/**,**/risk-engine/**,**/reports/**
            -Dsonar.python.version=3.12
            -Dsonar.scm.provider=git

      - name: Parse task ID
        id: parse_task
        run: |
          REPORT=".scannerwork/report-task.txt"
          if [ -f "$REPORT" ]; then
            TASK_ID=$(awk -F= '/ceTaskId/{print $2}' "$REPORT")
            echo "task_id=${TASK_ID}" >> "$GITHUB_OUTPUT"
          else
            echo "task_id=" >> "$GITHUB_OUTPUT"
          fi

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: Wait for SonarCloud
  # ═══════════════════════════════════════════════════════════════
  wait-sonar:
    name: ⏳ Wait for Sonar
    needs: sonar
    runs-on: ubuntu-latest
    if: needs.sonar.outputs.task_id != ''

    steps:
      - name: Poll task status
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          TASK_ID: ${{ needs.sonar.outputs.task_id }}
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -u "${SONAR_TOKEN}:" \
              "${{ env.SONAR_URL }}/api/ce/task?id=${TASK_ID}" | jq -r '.task.status')
            echo "[$i/30] Status: $STATUS"
            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILED|CANCELED) exit 1 ;;
            esac
            sleep 10
          done
          exit 1

  # ═══════════════════════════════════════════════════════════════
  # JOB 5: Risk Evaluation
  # ═══════════════════════════════════════════════════════════════
  risk:
    name: 📊 Risk Evaluation
    needs: [detect, wait-sonar]
    runs-on: ubuntu-latest
    outputs:
      risk_level: ${{ steps.risk.outputs.risk_level }}
      risk_score: ${{ steps.risk.outputs.risk_score }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install risk-engine deps
        run: pip install requests

      - name: Run risk analyzer
        id: risk
        env:
          SONAR_TOKEN:     ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY:     ${{ needs.detect.outputs.project_key }}
          SONAR_URL:       ${{ env.SONAR_URL }}
          WEIGHT_BUGS:     ${{ env.WEIGHT_BUGS }}
          WEIGHT_VULNS:    ${{ env.WEIGHT_VULNS }}
          WEIGHT_HOTSPOTS: ${{ env.WEIGHT_HOTSPOTS }}
          DETECTED_TYPES:  ${{ needs.detect.outputs.types_json }}
          GITHUB_RUN_URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          API_ENDPOINT:    ${{ secrets.API_ENDPOINT }}
        run: |
          mkdir -p reports
          python3 risk-analyzer.py | tee /tmp/risk_output.txt
          LEVEL=$(grep -oP '(?<=Level: )\w+' /tmp/risk_output.txt | tail -1)
          SCORE=$(grep -oP '(?<=Risk Score: )\d+' /tmp/risk_output.txt | tail -1)
          echo "risk_level=${LEVEL}" >> "$GITHUB_OUTPUT"
          echo "risk_score=${SCORE}" >> "$GITHUB_OUTPUT"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: reports/security-report.html
          retention-days: 30

      - name: ❌ Block if HIGH risk
        if: steps.risk.outputs.risk_level == 'HIGH'
        run: |
          echo "::error::🚨 Pipeline blocked - HIGH risk detected (score: ${{ steps.risk.outputs.risk_score }})"
          exit 1

  # ═══════════════════════════════════════════════════════════════
  # JOB 6: Publish Security Report to GitHub Pages
  # ═══════════════════════════════════════════════════════════════
  publish-report:
    name: 📄 Publish Report
    needs: [detect, risk]
    runs-on: ubuntu-latest
    if: needs.risk.outputs.risk_level != 'HIGH'

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: security-dashboard
          path: ./public

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📊 Report URL
        run: |
          echo "Security report available at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/security-report.html"

  # ═══════════════════════════════════════════════════════════════
  # JOB 7: Deploy DevSecOps API to Azure Container Apps
  # ═══════════════════════════════════════════════════════════════
  deploy-api:
    name: 🚀 Deploy API to Azure
    needs: [detect, risk]
    runs-on: ubuntu-latest
    if: |
      needs.risk.outputs.risk_level != 'HIGH' &&
      needs.detect.outputs.has_azure_creds == 'true'
    outputs:
      api_url: ${{ steps.deploy.outputs.url }}
    
    # GitHub OIDC federation - zero long-lived credentials
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Azure Login via OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & Push API Docker image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build API image from risk-engine files
          docker build \
            -f Dockerfile \
            -t ${ACR_LOGIN_SERVER}/devsecops-api:${IMAGE_TAG} \
            -t ${ACR_LOGIN_SERVER}/devsecops-api:latest \
            .
          
          docker push ${ACR_LOGIN_SERVER}/devsecops-api:${IMAGE_TAG}
          docker push ${ACR_LOGIN_SERVER}/devsecops-api:latest

      - name: Configure Managed Identity for Key Vault access
        run: |
          # Get or create managed identity
          IDENTITY_NAME="id-devsecops-api"
          IDENTITY_ID=$(az identity show \
            --name $IDENTITY_NAME \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query principalId -o tsv 2>/dev/null || true)
          
          if [ -z "$IDENTITY_ID" ]; then
            echo "Creating managed identity..."
            az identity create \
              --name $IDENTITY_NAME \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
            
            IDENTITY_ID=$(az identity show \
              --name $IDENTITY_NAME \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query principalId -o tsv)
            
            # Wait for identity propagation
            sleep 30
          fi
          
          echo "identity_id=${IDENTITY_ID}" >> $GITHUB_ENV
          
          # Grant Key Vault access
          az keyvault set-policy \
            --name ${{ secrets.AZURE_KEYVAULT_NAME }} \
            --object-id $IDENTITY_ID \
            --secret-permissions get list

      - name: Store SonarCloud token in Key Vault
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Store token securely in Key Vault
          az keyvault secret set \
            --vault-name ${{ secrets.AZURE_KEYVAULT_NAME }} \
            --name sonar-token \
            --value "$SONAR_TOKEN" \
            --content-type "text/plain"
          
          echo "✓ SONAR_TOKEN stored in Key Vault"

      - name: Deploy to Container Apps with security hardening
        id: deploy
        env:
          API_NAME: ${{ secrets.AZURE_API_NAME }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ github.sha }}
          VAULT_URL: https://${{ secrets.AZURE_KEYVAULT_NAME }}.vault.azure.net/
        run: |
          # Get managed identity resource ID
          IDENTITY_RESOURCE_ID=$(az identity show \
            --name id-devsecops-api \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query id -o tsv)
          
          # Update or create container app with managed identity
          if az containerapp show --name $API_NAME --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &>/dev/null; then
            echo "Updating existing container app..."
            az containerapp update \
              --name $API_NAME \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${ACR_LOGIN_SERVER}/devsecops-api:${IMAGE_TAG} \
              --set-env-vars \
                VAULT_URL=${VAULT_URL} \
                SONAR_URL=${{ env.SONAR_URL }} \
                PROJECT_KEY=${{ needs.detect.outputs.project_key }} \
                AZURE_AD_TENANT_ID=${{ secrets.AZURE_TENANT_ID }} \
                AZURE_AD_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          else
            echo "Creating new container app with security controls..."
            az containerapp create \
              --name $API_NAME \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment devsecops-env \
              --image ${ACR_LOGIN_SERVER}/devsecops-api:${IMAGE_TAG} \
              --target-port 5000 \
              --ingress external \
              --registry-server ${ACR_LOGIN_SERVER} \
              --user-assigned $IDENTITY_RESOURCE_ID \
              --env-vars \
                VAULT_URL=${VAULT_URL} \
                SONAR_URL=${{ env.SONAR_URL }} \
                PROJECT_KEY=${{ needs.detect.outputs.project_key }} \
                AZURE_AD_TENANT_ID=${{ secrets.AZURE_TENANT_ID }} \
                AZURE_AD_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }} \
              --cpu 0.5 --memory 1.0Gi \
              --min-replicas 1 --max-replicas 3
          fi

          # Get URL
          URL=$(az containerapp show \
            --name $API_NAME \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          
          echo "url=https://$URL" >> "$GITHUB_OUTPUT"
          echo "✅ API deployed to: https://$URL"

      - name: Configure IP restrictions (post-deployment)
        env:
          API_NAME: ${{ secrets.AZURE_API_NAME }}
        run: |
          # Only apply IP restrictions if explicitly configured
          CUSTOM_IPS="${{ secrets.ALLOWED_IP_RANGES || '' }}"
          
          if [ -z "$CUSTOM_IPS" ]; then
            echo "⚠️  ALLOWED_IP_RANGES not set - API is publicly accessible"
            echo "   To restrict access, add ALLOWED_IP_RANGES secret with comma-separated IPs/CIDRs"
            echo "   Example: 203.0.113.0/24,198.51.100.5/32"
            echo "✅ Managed Identity: enabled"
            echo "✅ Key Vault integration: enabled"
            exit 0
          fi
          
          echo "Configuring IP restrictions..."
          
          # GitHub Actions IP ranges (updated as of 2024)
          GITHUB_ACTIONS_IPS="20.28.0.0/16,20.150.0.0/16,20.205.0.0/16,20.232.0.0/16"
          ALLOWED_IPS="${GITHUB_ACTIONS_IPS},${CUSTOM_IPS}"
          
          az containerapp ingress access-restriction set \
            --name $API_NAME \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --rule-name "github-actions-and-approved" \
            --ip-address "$ALLOWED_IPS" \
            --action Allow \
            --description "GitHub Actions runners + approved client IPs"
          
          echo "✅ Managed Identity: enabled"
          echo "✅ Key Vault integration: enabled"
          echo "✅ IP restrictions: applied to ${CUSTOM_IPS}"

  # ═══════════════════════════════════════════════════════════════
  # JOB 8: Deploy Weather Application to Azure App Service
  # ═══════════════════════════════════════════════════════════════
  deploy-app:
    name: 🌤️ Deploy Weather App
    needs: [detect, risk, deploy-api]
    runs-on: ubuntu-latest
    if: |
      needs.risk.outputs.risk_level != 'HIGH' &&
      needs.detect.outputs.has_weather_app == 'true' &&
      needs.detect.outputs.deploy_enabled == 'true'
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Azure Login via OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Python App
        if: needs.detect.outputs.primary_type == 'python'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .

      - name: Deploy Node.js App
        if: needs.detect.outputs.primary_type == 'node'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: .

      - name: Deploy .NET App
        if: needs.detect.outputs.primary_type == 'dotnet'
        run: |
          dotnet publish -c Release -o ./publish
          cd publish
          zip -r ../app.zip .
          az webapp deployment source config-zip \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src ../app.zip

      - name: Configure App Settings with JWT authentication
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --settings \
              API_ENDPOINT=${{ needs.deploy-api.outputs.api_url }} \
              SONAR_URL=${{ env.SONAR_URL }} \
              PROJECT_KEY=${{ needs.detect.outputs.project_key }} \
              AZURE_AD_TENANT_ID=${{ secrets.AZURE_TENANT_ID }} \
              AZURE_AD_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}

      - name: Get App URL
        run: |
          URL=$(az webapp show \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query defaultHostName -o tsv)
          echo "✅ Weather app deployed to: https://$URL"
          echo "⚠️  Frontend must obtain JWT from Azure AD before calling API"

  # ═══════════════════════════════════════════════════════════════
  # JOB 9: Deployment Summary
  # ═══════════════════════════════════════════════════════════════
  summary:
    name: 📋 Deployment Summary
    needs: [detect, risk, deploy-api, deploy-app, publish-report]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create Summary
        run: |
          echo "## 🎯 DevSecOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- **Risk Level:** ${{ needs.risk.outputs.risk_level }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Risk Score:** ${{ needs.risk.outputs.risk_score }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project Type:** ${{ needs.detect.outputs.primary_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** ${{ needs.deploy-api.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Weather App:** ${{ needs.deploy-app.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Report:** ${{ needs.publish-report.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy-api.outputs.api_url }}" != "" ]; then
            echo "### 🔗 Deployed URLs" >> $GITHUB_STEP_SUMMARY
            echo "- **API:** ${{ needs.deploy-api.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "- **Security Dashboard:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/security-report.html" >> $GITHUB_STEP_SUMMARY
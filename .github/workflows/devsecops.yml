name: DevSecOps
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      weight_bugs:
        description: 'Weight for Bugs'
        default: '3'
      weight_vulns:
        description: 'Weight for Vulnerabilities'
        default: '5'
      weight_hotspots:
        description: 'Weight for Hotspots'
        default: '2'
      risk_threshold_low:
        description: 'Low risk ceiling'
        default: '10'
      risk_threshold_med:
        description: 'Medium risk ceiling'
        default: '30'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  devsecops:
    uses: Jubit-Pincy/devsecops-toolkit/.github/workflows/reusable.yml@main
    with:
      sonar_org:            jubit-pincy
      azure_resource_group: rg-devsecops
      azure_api_name:       devsecops-api-85826533
      azure_webapp_name:    devsecops-webapp
      weight_bugs:          ${{ github.event.inputs.weight_bugs || '3' }}
      weight_vulns:         ${{ github.event.inputs.weight_vulns || '5' }}
      weight_hotspots:      ${{ github.event.inputs.weight_hotspots || '2' }}
      risk_threshold_low:   ${{ github.event.inputs.risk_threshold_low || '10' }}
      risk_threshold_med:   ${{ github.event.inputs.risk_threshold_med || '30' }}
      app_url:              https://devsecops-webapp.azurewebsites.net
    secrets: inherit